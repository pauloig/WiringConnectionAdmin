{% extends 'index.html' %} 
{%load static%}
{% block title %} CREATE ITEMS {% endblock %} 
{% load widget_tweaks%}
{% block container %}

<div class="container">
    <form method='post' enctype="multipart/form-data">
        {% csrf_token %}


        <br />
        <div class="row">
            <div class="col-lg-12">
                <div class="card rounded">
                    <h6 class="card-header card-header-wc" >Create PO</h6>
                    <div class="card-body">
                            <div class="row"> 
                                <div class="col-lg-12">
                                    <div class="mb-3">    
                                        <label for="PID" class="form-label">Vendor - Subcontractor</label>                
                                        <div class="input-group mb-3">                                          
                                                                                                                               
                                            <input type="text" class="form-control" placeholder="Select Vendor" aria-label="vendorName" id="vendorName" name="vendorName" aria-describedby="basic-addon1" value="{{selectedvs2.name}}" disabled> 
                                            <input type="text" class="form-control" placeholder="Select Vendor" aria-label="vendor" id="vendor" name="vendor" aria-describedby="basic-addon1" value="{{selectedvs2.id}}" hidden>                                               
                                            <button hx-get="/vendor_subcontractor_list/{{selectedid}}/create_po/0" class="btn btn-primary py-2" hx-target="#dialog" ><i class="fa-sharp fa-solid fa-magnifying-glass"></i></button>
                                            <a href="/create_vendor_modal/{{selectedWO}}/0/0" type="button" class="btn btn-success"><i class="fa-sharp fa-solid fa-plus"> V</i></a>    
                                            <a href="/create_subcontractor_modal/{{selectedWO}}/0/0" type="button" class="btn btn-success"><i class="fa-sharp fa-solid fa-plus"> S</i></a>                                              
                                        </div>                                      
                                    </div>    
                                    <!--<div class="mb-3">
                                        <label for="vendor" class="form-label">Vendor - Subcontractor</label>
                                        <select class="form-select" name="vendor" id="vendor"> 
                                            <option value ="0" > ---</option>
                                            {% for i in vendorList%}
                                                <option value ="{{i.id}}" > {{i.id}} - {{i.name}}</option>
                                            {%endfor%}
                                        </select>  
                                    </div> -->                                  
                                </div>                                                                                
                            </div>       
                            <div class="row"> 
                                <div class="col-lg-12">
                                    <div class="mb-3">    
                                        <label for="PID" class="form-label">Work Order:</label>                
                                        <div class="input-group mb-3">                                         
                                               <input type="text" class="form-control" placeholder="Work Order" aria-label="woID" id="woID" name="woID" aria-describedby="basic-addon1" value="{{order}}" disabled>                                                                                        
                                        </div>                                      
                                    </div>                                                         
                                </div>                                                                                
                            </div>                 
                            <div class="row">
                                  <!-- Using the formset -->
                                {{ form.as_p }}
                                <input type="hidden" id="current_po_id" value="{{ po.id|default:'' }}">
                                <div id="invoice-warning" class="mt-2" style="display:none;"></div>
                            </div>
                            <div class="row">
                                <div class="col-lg-8">
                                  <label class="form-label" for="file">Select Receipt</label>  
                                                                    
                                  <div class="input-group-btn">
                                      <div class="input-group mb-3">
                                        {% if po.receipt != '' and po.receipt != None %}   
                                            <a class="mx-5" href="/static/media/{{po.receipt}}" target="_blank">View Actual File</a>  
                                        {%endif%}
                                          <input type="file" class="form-control" id="file" name="myfile" accept="application/pdf, image/png, image/jpeg">
                                          <label class="input-group-text " for="file">Select File</label>
                                      </div>
                                  </div>                                
                                </div>  
                                <div class="col-lg-4">
                                    
                                </div>
                            </div>     
                            <div class="row">
                                <div class="col-lg-6">  
                                    <div class="form-outline" style="align-items: center;">                                       
                                        <!-- <input type="submit" value="Save"> -->
                                        <input class="btn btn-primary" type="submit" value="Save">
                                        <a href="/po_list/{{selectedWO}}" type="button" class="btn btn-danger">Close</a> 
                                        
                                    </div>
                                </div>
                            </div>                                    
                    </div>
                </div>                 
            </div>
        </div>      
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  const input = document.querySelector('input[name="invoices"]');
  const warnDiv = document.getElementById('invoice-warning');
  const currentId = document.getElementById('current_po_id') ? document.getElementById('current_po_id').value : '';

  if (!input) return;

  input.addEventListener('blur', function(){
    const val = input.value || '';
    const invoices = val.split(',').map(s=>s.trim()).filter(Boolean);
    if (invoices.length === 0) {
      warnDiv.style.display = 'none';
      warnDiv.innerHTML = '';
      return;
    }

    const params = new URLSearchParams();
    params.set('invoices', invoices.join(','));
    if (currentId) params.set('current_id', currentId);

    fetch('/validate_invoices/?' + params.toString(), { credentials: 'same-origin' })
      .then(r => r.json())
      .then(data => {
        if (data.matches && data.matches.length) {
          let msg = 'Duplicate invoices found: ';
          const html = [];
          data.matches.forEach(m => {
            msg += `Invoice: ${m.invoice} | PO#: ${m.poNumber} | Amount: ${m.total}\n`;
            html.push(`<div class="alert alert-warning"><strong>Duplicate invoices found </br> Invoice:</strong> ${m.invoice} | <strong>PO#:</strong> ${m.poNumber} | <strong>Amount:</strong> ${m.total}</div>`);
          });
          alert(msg);
          warnDiv.innerHTML = html.join('');
          warnDiv.style.display = 'block';
        } else {
          warnDiv.style.display = 'none';
          warnDiv.innerHTML = '';
        }
      })
      .catch(err => {
        console.error('validate_invoices error', err);
      });
  });
});
</script>

{% endblock %}
